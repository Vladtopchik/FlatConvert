<!DOCTYPE html>
<html lang="en" data-theme="{% block theme %}dark{% endblock %}">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}FlatConvert{% endblock %}</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap">
    <link rel="stylesheet" href="{{ css('style.css') }}">
    <link rel="icon" href="{{ static('images/logo.svg') }}" type="image/x-icon">
    <style>
        @font-face {
            font-family: 'Icons';
            src: url('{{ static("fonts/icons.woff2") }}') format('woff2');
        }
    </style>
    {% block head %}
    {% endblock %}
</head>
<body>
    <header>
        <a class="logo" href="{{ url('home') }}">
            {{ load_svg('logo.svg') }}
            <b class="logo-text">FlatConvert</b>
        </a>
        <nav>
            {% include 'partials/base/nav.html' %}
        </nav>
    </header>
    <main>
        {% block main %}
        {% endblock %}
    </main>
    {% block script %}
    {% endblock %}
</body>
</html>
